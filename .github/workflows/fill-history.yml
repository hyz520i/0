name: Fill History (Daily Auto + Manual Batch)

on:
  schedule:
    # 每天 UTC 20:00 运行（北京时间次日 4:00）
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      start_date:
        description: '开始日期 (YYYY-MM-DD)'
        required: true
        default: '2025-08-12'
      end_date:
        description: '结束日期 (YYYY-MM-DD) - 留空则默认为今天'
        required: false
        default: ''
      daily_commits:
        description: '每天提交次数 (用于历史填充)'
        required: true
        default: '12'

jobs:
  fill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 修改1：拉取完整仓库历史，解决浅克隆导致的提交解析报错
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.email "1767158165@qq.com"
          git config --global user.name "hyz520i"

      - name: Generate commits
        env:
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          DAILY_COMMITS: ${{ github.event.inputs.daily_commits }}
        run: |
          # 判断触发方式
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时触发：生成当天提交
            TODAY=$(date +%Y-%m-%d)
            COMMITS_PER_DAY=12
            echo "Daily run: generating $COMMITS_PER_DAY commits for $TODAY"
            for i in $(seq 1 $COMMITS_PER_DAY); do
              git commit --allow-empty -m "daily fill #$i on $TODAY"
            done
          else
            # 手动触发：生成区间历史提交
            if [ -z "$END_DATE" ]; then
              END_DATE=$(date +%Y-%m-%d)
            fi
            current_date="$START_DATE"
            # 修改2：修复日期边界，包含结束日期当天的提交
            END_DATE_TS=$(date -d "$END_DATE" +%s)
            while [ $(date -d "$current_date" +%s) -le "$END_DATE_TS" ]; do
              echo "Generating $DAILY_COMMITS commits for $current_date"
              for i in $(seq 1 $DAILY_COMMITS); do
                export GIT_AUTHOR_DATE="$current_date 12:00:00"
                export GIT_COMMITTER_DATE="$current_date 12:00:00"
                git commit --allow-empty -m "chore: sync #$i on $current_date"
              done
              current_date=$(date -d "$current_date + 1 day" +%Y-%m-%d)
            done
          fi

      - name: Push commits
        run: |
          # 修改3：明确推送分支，提升稳定性；强制推送更安全
          # 如果你的仓库默认分支是 master，请把这里改为 master
          DEFAULT_BRANCH="main"
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 定时任务：普通追加推送
            git push origin "$DEFAULT_BRANCH"
          else
            # 手动任务：强制推送覆盖历史
            git push --force-with-lease origin "$DEFAULT_BRANCH"
          fi
